<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: Electrical Fundamentals</title>
    <style>
        /* မူလ UI ပုံစံကို ထိန်းသိမ်းထားတဲ့ CSS */
        body {
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        /* Container ကို Mobile မှာ 100% ပြည့်အောင် ညှိပေးလိုက်ပါတယ် */
        .container {
            width: 100%;
            max-width: 800px; /* Desktop မှာဆိုရင်တော့ 800px ထက် မကျော်ပါဘူး */
            margin: auto;
            padding: 20px;
            box-sizing: border-box; /* Padding ကြောင့် Screen ကျယ်မသွားအောင် ကာကွယ်ပေးပါတယ် */
        }

        /* မူလ UI အရောင်များ */
        h1 {
            color: #1a5f7a;
            border-bottom: 3px solid #1a5f7a;
            padding-bottom: 10px;
            text-align: center;
            font-size: 1.8rem; /* စာလုံးကို ပိုကြီးစေပါတယ် */
        }

        h2 {
            color: #1a5f7a;
            border-left: 5px solid #1a5f7a;
            padding-left: 15px;
            margin-top: 30px;
            font-size: 1.5rem;
        }

        p {
            margin-bottom: 15px;
            text-align: justify;
            font-size: 1.1rem; /* ဖုန်းမှာ စာဖတ်ရလွယ်အောင် စာလုံးကို နည်းနည်း ထပ်ချဲ့ထားပါတယ် */
        }

        /* မူလ Box Style များ */
        .keypoint {
            background-color: #e8f4f8;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            border-left: 5px solid #3498db;
        }

        .maintenance {
            background-color: #fff4e5;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #f39c12;
        }

        .maintenance-title {
            font-weight: bold;
            color: #d35400;
            display: block;
            margin-bottom: 5px;
        }

        /* ပုံများကို Screen အပြည့် ပြသခြင်း */
        .image-container {
            text-align: center;
            margin: 20px 0;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        /* Mobile သီးသန့် ပြင်ဆင်ချက် (Screen 600px အောက်ဆိုရင် စာလုံးပိုကြီးမယ်) */
        @media screen and (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.3rem; }
            p { font-size: 1.1rem; }
            .keypoint, .maintenance { padding: 12px; }
        }
    </style>
</head>

<body>

<div class="mind-map">
    <details class="main-system" open>
        <summary>Aircraft Electrical System</summary>
        
        <details class="sub-chapter">
            <summary>Chapter 1 : Fundamental of Electrical</summary>
            
            <details class="inner-system">
                <summary>Chapter အနှစ်ချုပ်</summary>
                <div class="content-box">
                  <button class="btn-home" onclick="go1Summery()">အနှစ်ချုပ်ဖတ်ရန် နှိပ်ပါ...</button>
                </div>
                <div class="content-box">
                    အာဏာသက်ရောက်မည့်နေ့: ၂၀၂၆ ဖေဖော်ဝါရီ ၀၆
                </div>
            </details>

            <details class="inner-system">
                <summary>System 2</summary>
                <div class="content-box">
                    ဒီဇိုင်းခွင့်ပြုချက်ပိုင်ရှင်: Airbus
                </div>
            </details>

        </details>

        <details class="sub-chapter">
            <summary>လိုအပ်သော လုပ်ဆောင်ချက်များ</summary>
            <div class="content-box">
                ဆောင်ရွက်ရမည့် အချက်များ...
            </div>
        </details>

    </details>
</div>
<script>

 function go1Summery() {
    window.location.href = "Elec_summery.html";
  }
</script>
</body>
</html>
