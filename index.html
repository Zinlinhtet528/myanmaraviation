<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: Electrical Fundamentals</title>
    <style>
        /* အခြေခံ Style များ */
        body {
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            /* စာသားတွေ screen ထဲက ထွက်မကုန်အောင် ထိန်းပေးပါတယ် */
            word-wrap: break-word;
        }

        /* Container ကို fixed width မသုံးဘဲ flexible ဖြစ်အောင် ပြင်ဆင်ခြင်း */
        .container {
            width: 100%;
            max-width: 800px; /* Desktop မှာ 800px ထက်မကြီးအောင် ထိန်းထားပေးပါတယ် */
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-sizing: border-box; /* padding ကြောင့် screen ကျယ်မသွားအောင် ထိန်းပေးပါတယ် */
            min-height: 100vh;
        }

        h1 {
            color: #1a5f7a;
            border-bottom: 3px solid #1a5f7a;
            padding-bottom: 10px;
            text-align: center;
            font-size: 1.6rem; /* Mobile နဲ့ ကိုက်ညီတဲ့ size */
        }

        h2 {
            color: #1a5f7a;
            border-left: 5px solid #1a5f7a;
            padding-left: 15px;
            margin-top: 30px;
            font-size: 1.3rem;
        }

        p {
            margin-bottom: 15px;
            text-align: justify;
        }

        /* အရေးကြီးအချက်များ Highlight လုပ်ခြင်း */
        .keypoint {
            background-color: #e8f4f8;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            border-left: 5px solid #3498db;
        }

        .maintenance {
            background-color: #fff4e5;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #f39c12;
        }

        .maintenance-title {
            font-weight: bold;
            color: #d35400;
            display: block;
            margin-bottom: 5px;
        }

        /* ပုံများအတွက် Mobile optimization */
        .image-placeholder {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border: 1px solid #ddd;
            padding: 5px;
            text-align: center;
        }

        /* ဖုန်း screen သေးသေးလေးတွေအတွက် ထပ်ဆင့်ညှိပေးခြင်း */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
            h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

<div class="mind-map">

                </div>
                <div class="content-box">
                    အာဏာသက်ရောက်မည့်နေ့: ၂၀၂၆ ဖေဖော်ဝါရီ ၀၆
                </div>
            </details>

            <details class="inner-system">
                <summary>System 2</summary>
                <div class="content-box">
                    ဒီဇိုင်းခွင့်ပြုချက်ပိုင်ရှင်: Airbus
                </div>
            </details>

        </details>

        <details class="sub-chapter">
            <summary>လိုအပ်သော လုပ်ဆောင်ချက်များ</summary>
            <div class="content-box">
                ဆောင်ရွက်ရမည့် အချက်များ...
            </div>
        </details>

    </details>
</div>

 function go1Summery() {
    window.location.href = "Elec_summery.html";

</script>
</body>
</html>
